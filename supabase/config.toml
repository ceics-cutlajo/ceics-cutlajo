# Supabase local configuration
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "ceics-cutlajo"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/api/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_confirmations = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true

[auth.email.template.invite]
subject = "Te invitamos al CEICS CUTLAJO"
content_path = "./supabase/templates/invite.html"

[auth.email.template.magic_link]
subject = "Tu enlace de acceso al CEICS CUTLAJO"
content_path = "./supabase/templates/magic_link.html"

[storage]
enabled = true
file_size_limit = "50MiB"

[edge_runtime]
enabled = true
